## `config/config.yaml`

```yaml
project_name: "aml_dna_panel_pipeline"

samples: "config/samples.example.tsv"

panel:
  bed: "config/panel/panel_targets.bed"
  genes: "config/panel/panel_genes.txt"

reference:
  fasta: "/path/to/reference/genome.fa"
  fasta_fai: "/path/to/reference/genome.fa.fai"
  sequence_dict: "/path/to/reference/genome.dict"

resources:
  dbsnp: "/path/to/Homo_sapiens_assembly38.dbsnp138.vcf"
  mills_indels: "/path/to/Mills_and_1000G_gold_standard.indels.hg38.vcf.gz"
  pon: "/path/to/1000g_pon.hg38.vcf.gz"
  germline_resource: "/path/to/af-only-gnomad.hg38.vcf.gz"
  vep_cache: "/path/to/vep/cache"
  vep_plugins: "/path/to/vep/plugins"

tools:
  bwa_mem2: "bwa-mem2"
  samtools: "samtools"
  picard: "picard"
  gatk: "gatk"
  bcftools: "bcftools"
  vep: "vep"
  python: "python"

params:
  bwa_threads: 8
  samtools_threads: 4
  gatk_java_opts: "-Xmx16g"
  mapq_min: 20

directories:
  manifest: "results/manifest"
  bam: "results/bam"
  qc: "results/qc"
  bqsr: "results/bqsr"
  vcf: "results/vcf"
  annotation: "results/annotation"
  tables: "results/tables"
  logs: "logs"
  benchmark: "benchmark"
