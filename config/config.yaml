project_name: "aml_dna_panel_pipeline"

input:
  raw_fastq_dir: "/path/to/raw_fastq"

samples: "config/samples.example.tsv"

panel:
  bed: "config/panel/panel_targets.bed"
  genes: "config/panel/panel_genes.txt"

reference:
  fasta: "/path/to/reference/GRCh38.p14.genome.fa"
  fasta_fai: "/path/to/reference/GRCh38.p14.genome.fa.fai"
  sequence_dict: "/path/to/reference/GRCh38.p14.genome.dict"
  interval_bed: "/path/to/intervals/panel_targets_all_hg38.dict_filtered.bed"
  interval_list: "/path/to/intervals/panel_targets_all_hg38.interval_list"

resources:
  dbsnp: "/path/to/resources/Homo_sapiens_assembly38.dbsnp138.vcf.gz"
  mills_indels: "/path/to/resources/Mills_and_1000G_gold_standard.indels.hg38.vcf.gz"
  pon: "/path/to/resources/1000g_pon.hg38.vcf.gz"
  germline_resource: "/path/to/resources/af-only-gnomad.hg38.vcf.gz"
  vep_cache: "/path/to/vep_cache/.vep"
  vep_plugins: "/path/to/vep_cache/.vep/Plugins"
  vep_fasta: "/path/to/vep_cache/.vep/homo_sapiens/115_GRCh38/Homo_sapiens.GRCh38.dna.toplevel.fa.gz"

tools:
  bwa_mem2: "bwa-mem2"
  samtools: "samtools"
  picard: "picard"
  gatk: "gatk"
  bcftools: "bcftools"
  vep: "/path/to/ensembl-vep/vep"
  python: "python"

params:
  bwa_threads: 8
  samtools_threads: 4
  sort_memory: "1G"
  gatk_java_opts: "-Xmx16g"
  mapq_min: 20

directories:
  manifest: "results/manifest"
  bam: "results/bam"
  qc: "results/qc"
  bqsr: "results/bqsr"
  vcf: "results/vcf"
  annotation: "results/annotation"
  tables: "results/tables"
  logs: "logs"
  benchmark: "benchmark"
